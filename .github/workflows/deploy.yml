name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug - Show package file hashes
        run: |
          echo "=== package.json SHA256 ==="
          sha256sum package.json
          echo "=== package-lock.json SHA256 ==="
          sha256sum package-lock.json
          
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Upgrade to npm 11.11.0
        run: npm install -g npm@11.11.0

      - name: Debug - Environment info
        run: |
          echo "=== Environment Info ==="
          node --version
          npm --version
          echo "=== npm config ==="
          npm config get lockfileVersion
          
      - name: Clear npm cache
        run: npm cache clean --force

      - name: Debug - Verify lock file sync (dry-run)
        run: |
          echo "=== Testing lock file sync with dry-run ==="
          npm ci --dry-run || echo "❌ SYNC CHECK FAILED"
          
      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run export
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_BLOG_DATABASE_ID: ${{ secrets.NOTION_BLOG_DATABASE_ID }}

      - run: touch ./out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
