<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Christian Weber</title>
    <meta
      name="description"
      content="Page not found — AI-Native Cloud Architect"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blue: #0b1f3a;
        --blue-mid: #0d2447;
        --cyan: #00e5ff;
        --cyan-dim: #00b8cc;
        --cyan-pale: #e4fbff;
        --white: #ffffff;
        --g100: #f4f6f8;
        --g300: #c8d4e3;
        --g500: #8a9bb0;
        --g700: #4a5a72;
        --serif: "DM Serif Display", Georgia, serif;
        --body: "DM Sans", sans-serif;
        --mono: "DM Mono", monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: var(--body);
        background: var(--blue);
        color: var(--white);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      ::selection {
        background: var(--cyan);
        color: var(--blue);
      }

      .error-container {
        text-align: center;
        padding: 40px 20px;
        max-width: 600px;
      }
      h1 {
        font-family: var(--serif);
        font-size: clamp(72px, 12vw, 120px);
        font-weight: 400;
        line-height: 1;
        letter-spacing: -0.025em;
        color: var(--cyan);
        margin-bottom: 20px;
      }
      h2 {
        font-family: var(--serif);
        font-size: clamp(28px, 4.2vw, 46px);
        font-weight: 400;
        line-height: 1.12;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
      }
      p {
        font-size: 16px;
        font-weight: 300;
        line-height: 1.76;
        color: var(--g500);
        margin-bottom: 36px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--mono);
        font-size: 11.5px;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        font-weight: 500;
        text-decoration: none;
        padding: 13px 26px;
        border-radius: 4px;
        background: var(--cyan);
        color: var(--blue);
        transition:
          transform 0.18s,
          background 0.18s;
      }
      .btn:hover {
        transform: translateY(-2px);
        background: var(--cyan-dim);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .rise {
        opacity: 0;
        animation: rise 0.7s ease forwards;
      }
      .r1 {
        animation-delay: 0.05s;
      }
      .r2 {
        animation-delay: 0.18s;
      }
      .r3 {
        animation-delay: 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <h1 class="rise r1">404</h1>
      <h2 class="rise r2">Page Not Found</h2>
      <p class="rise r3">The page you're looking for doesn't exist.</p>
      <a href="index.html" class="btn rise r3">Go Back Home</a>
    </div>
  </body>
</html>
