<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="560" height="160">
  <defs>
    <linearGradient id="flameGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00B8CC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00B8CC" stop-opacity="0"/>
    </linearGradient>
    <filter id="softglowL">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fins -->
  <path d="M 20,68 L 15,76 L 24,68 Z" fill="#0B1F3A" opacity="0.35"/>
  <path d="M 48,68 L 53,76 L 44,68 Z" fill="#0B1F3A" opacity="0.35"/>

  <!-- Row 3 — foundation blocks -->
  <rect x="14" y="55" width="13" height="10" rx="1.5" fill="#0B1F3A" opacity="0.2"/>
  <line x1="14" y1="59" x2="27" y2="59" stroke="#0B1F3A" stroke-width="0.6" opacity="0.15"/>
  <rect x="28" y="55" width="13" height="10" rx="1.5" fill="#0B1F3A" opacity="0.32"/>
  <line x1="28" y1="59" x2="41" y2="59" stroke="#0B1F3A" stroke-width="0.6" opacity="0.2"/>
  <rect x="42" y="55" width="13" height="10" rx="1.5" fill="#0B1F3A" opacity="0.2"/>
  <line x1="42" y1="59" x2="55" y2="59" stroke="#0B1F3A" stroke-width="0.6" opacity="0.15"/>

  <!-- Row 2 — cyan AI blocks -->
  <rect x="21" y="42" width="13" height="11" rx="1.5" fill="#00B8CC" opacity="0.85"/>
  <line x1="21" y1="47" x2="34" y2="47" stroke="white" stroke-width="0.7" opacity="0.4"/>
  <rect x="35" y="42" width="13" height="11" rx="1.5" fill="#00B8CC" opacity="0.85"/>
  <line x1="35" y1="47" x2="48" y2="47" stroke="white" stroke-width="0.7" opacity="0.4"/>

  <!-- Row 1 — top block -->
  <rect x="28" y="29" width="14" height="11" rx="1.5" fill="#0B1F3A" opacity="0.9"/>
  <line x1="28" y1="34" x2="42" y2="34" stroke="white" stroke-width="0.8" opacity="0.2"/>

  <!-- Nose cone -->
  <path d="M 28,29 L 35,10 L 42,29 Z" fill="#0B1F3A"/>
  <!-- Window -->
  <circle cx="35" cy="23" r="3" fill="#00B8CC" opacity="0.9"/>
  <circle cx="35" cy="23" r="1.5" fill="white"/>

  <!-- Flame -->
  <path d="M 22,68 Q 26,76 28,72 Q 30,80 35,76 Q 40,80 42,72 Q 44,76 48,68"
        fill="none" stroke="url(#flameGradL)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Separator -->
  <line x1="72" y1="14" x2="72" y2="66" stroke="#0B1F3A" stroke-width="1" opacity="0.1"/>

  <!-- Wordmark -->
  <text x="84" y="46"
    font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" letter-spacing="-0.8"
    fill="#0B1F3A">MaCh2<tspan fill="#00B8CC">.Cloud</tspan></text>

  <text x="85" y="60"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-size="8.5" font-weight="400" letter-spacing="3.2"
    fill="#0B1F3A" opacity="0.35">AI‑Native Cloud & Platform ArchitectURE</text>
</svg>
